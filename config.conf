[colors]
background = #00000000
background-alt = #444444
foreground = #dfdfdf
primary = #ffb52a
secondary = #e60053
alert = #bd2c40

[bar/main]
width = 100%
height = 34
radius = 0.0
fixed-center = true
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
line-color = #00000000

border-size = 0
padding-left = 1
padding-right = 1

module-margin = 1

font-0 = Ac437 IBM VGA 9x16:size=18;3
font-1 = Unifont-JP:size=16;3

; # top bar
modules-left = workspace-list
modules-center = now-playing
modules-right = volume-label volume cpu memory gpu-amd bld-label build-percent

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[bar/boot]
width = 100%
height = 34
radius = 0.0
fixed-center = true
bottom = false
monitor = ${env:MONITOR:}

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
line-color = #00000000

border-size = 0
padding-left = 1
padding-right = 1

module-margin = 1

font-0 = Ac437 IBM VGA 9x16:size=18;3
font-1 = Unifont-JP:size=16;3

; # boot bar
modules-left =
modules-center = startup-load
modules-right =
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[bar/main2]
width = 100%
height = 34
radius = 0.0
fixed-center = true
bottom = false
offset-y = 34

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
line-color = #00000000

border-size = 0
padding-left = 1
padding-right = 1

module-margin = 1

font-0 = Ac437 IBM VGA 9x16:size=18;3
font-1 = Unifont-JP:size=16;3

; # bottom bar
modules-left = identity-label gentoo-update theme-control flameshot tools-launcher repo-sync
modules-center = spacer-spin-left status-word-cycle candy-loop spacer-spin-right
modules-right = wifi-label wifi date
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[bar/workspaces-only]
width = 100%
height = 28
radius = 0.0
fixed-center = true
bottom = false
monitor = ${env:MONITOR:}

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
line-color = #00000000

border-size = 0
padding-left = 1
padding-right = 1

module-margin = 1

font-0 = Ac437 IBM VGA 9x16:size=18;3
font-1 = Unifont-JP:size=16;3

; # side monitor bar
modules-left =
modules-center = workspace-list
modules-right =
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = #00000000
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = #555
label-empty-padding = 1

[module/workspace-list]
type = custom/script
exec = ~/.config/polybar/scripts/workspace-list.sh
interval = 0.3

[module/startup-load]
type = custom/script
exec = ~/.config/polybar/scripts/startup-load.sh
exec-if = ~/.config/polybar/scripts/startup-load.sh --alive
interval = 0.2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/volume]
type = custom/script
exec = ~/.config/polybar/scripts/volume-status.sh
interval = 2

[module/volume-label]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh --block 'VOL'
interval = 0.2

[module/now-playing]
type = custom/script
exec = ~/.config/polybar/scripts/now-playing.sh
interval = 0.25

[module/cpu]
type = custom/script
exec = ~/.config/polybar/scripts/cpu-status.sh
interval = 2

[module/memory]
type = custom/script
exec = ~/.config/polybar/scripts/memory-status.sh
interval = 2

[module/gpu-amd]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-status.sh --amd
interval = 2

[module/gpu-nv]
type = custom/script
exec = ~/.config/polybar/scripts/gpu-status.sh --nv
interval = 2

[module/date]
type = internal/date
interval = 1

date = %a %Y-%m-%d %H:%M:%S
date-alt = %A, %d %B %Y %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[module/wifi]
type = custom/script
exec = ~/.config/polybar/scripts/wifi-status.sh
interval = 1

[module/wifi-label]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh --block 'WIFI'
interval = 0.2

[module/build-percent]
type = custom/script
exec = ~/.config/polybar/scripts/build-progress.sh
interval = 1

[module/bld-label]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh --block 'BLD'
interval = 0.2

[module/gentoo-update]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh '["CLOSE THE WORLD, OPEN THE NEXT"]'
interval = 0.2
click-left = kitty -e ~/.config/polybar/scripts/gentoo-update.sh

[module/identity-label]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh 'CrimsonVAR Gentoo'
interval = 0.2

[module/theme-control]
type = custom/script
exec = ~/.config/polybar/scripts/theme-control.sh --label
interval = 0.2
click-left = ~/.config/polybar/scripts/theme-control.sh --next
click-middle = ~/.config/polybar/scripts/theme-control.sh --next-mode
click-right = kitty -e ~/.config/polybar/scripts/theme-control.sh --menu

[module/repo-sync]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh --block 'SYNC'
interval = 0.2
click-left = kitty -e ~/.config/polybar/scripts/repo-sync.sh gentoo
click-right = kitty -e ~/.config/polybar/scripts/repo-sync.sh --quick gentoo

[module/flameshot]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh --block 'SHOT'
interval = 0.2
click-left = flameshot gui
click-right = flameshot full -p ~/Pictures/Screenshots

[module/tools-launcher]
type = custom/script
exec = ~/.config/polybar/scripts/theme-engine.sh --block 'TOOLS'
interval = 0.2
click-left = ~/.config/polybar/scripts/tools-launcher.sh

[module/spacer-spin-left]
type = custom/script
exec = ~/.config/polybar/scripts/spacer-spinner.sh --reverse
interval = 0.15

[module/spacer-spin-right]
type = custom/script
exec = ~/.config/polybar/scripts/spacer-spinner.sh
interval = 0.15

[module/status-word-cycle]
type = custom/script
exec = ~/.config/polybar/scripts/status-word-cycle.sh
interval = 1.0

[module/candy-loop]
type = custom/script
exec = ~/.config/polybar/scripts/candy-loop.sh
interval = 0.2

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
